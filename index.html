<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Sam</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="start-screen">
        <button id="start-btn">Click to Open My Heart</button>
    </div>

    <div class="frame"></div>
    
    <h1 class="main-title">this is for you</h1>

    <canvas id="bg-canvas"></canvas>

    <div id="canvas-container"></div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>
    <div id="quiz-container">
    <div id="question" class="question-text">Ready for a surprise, Sam?</div>
    <div id="options" class="btn-group">
        <button class="quiz-btn" onclick="startQuiz()">Yes!</button>
    </div>
</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
